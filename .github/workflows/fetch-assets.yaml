name: Fetch Assets

on:
  push:
    branches:
      - main

jobs:
  fetch_songs:
    runs-on: windows-latest
    
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit, push,
      # and manage releases/tags.
      contents: write

    steps:
      - name: Disable line-ending conversion
        run: |
          git config --global core.autocrlf false
        
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Zip System folders
        shell: pwsh
        run: |
          # Check if the System folder exists before trying to loop
          if (Test-Path "System") {
            cd System
            $folders = Get-ChildItem -Directory
            foreach ($folder in $folders) {
              $zipName = "$($folder.Name).zip"
              # Compresses the contents of the folder and places the zip in the root directory
              Compress-Archive -Path "$($folder.FullName)\*" -DestinationPath "..\$zipName" -Force
            }
            cd ..
          } else {
            Write-Host "System folder not found. Skipping zip creation."
          }

      - name: Publish Zips to Release
        uses: ncipollo/release-action@v1
        with:
          tag: "system-assets"           # A static tag ensures we only keep one release alive
          name: "System Assets"          # The display name of the release
          artifacts: "*.zip"             # Uploads all the zips we just created in the root
          allowUpdates: true             # Updates the release if it already exists
          replacesArtifacts: true        # Overwrites the old zips with the new ones
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute fetch_assets.py
        run: python fetch_assets.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update assets info" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}